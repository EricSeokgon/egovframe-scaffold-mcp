name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build (tsc)
        run: npm run build

      - name: MCP handshake (offline)
        run: |
          printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
          | node dist/index.js 2>/dev/null | grep -q '"create_egovframe_project"' \
          && printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
          | node dist/index.js 2>/dev/null | grep -q '"add_egovframe_components"' \
          && echo "handshake OK" || (echo "handshake FAILED" && exit 1)

      - name: Catalog test (offline)
        run: npm run test:catalog

      - name: AI catalog test (offline)
        run: npm run test:ai

      - name: Smoke test (downloads official templates)
        run: npm run smoke

      - name: Extended templates test (downloads official templates)
        run: npm run test:templates

      - name: Components assembly test (downloads egovframe-common-components)
        run: npm run test:components

      - name: AI assembly test (downloads egovframe-ai-rag)
        run: npm run test:ai-assembly
