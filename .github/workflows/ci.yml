name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Release gate (build + offline tests)
        run: npm run prepublishOnly

      - name: MCP handshake (offline)
        run: |
          printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
          | node dist/index.js 2>/dev/null | grep -q '"create_egovframe_project"' \
          && printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
          | node dist/index.js 2>/dev/null | grep -q '"add_egovframe_components"' \
          && printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
          | node dist/index.js 2>/dev/null | grep -q '"sync_egovframe_catalog"' \
          && printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
          | node dist/index.js 2>/dev/null | grep -q '"generate_egovframe_crud"' \
          && echo "handshake OK" || (echo "handshake FAILED" && exit 1)

      - name: Smoke test (downloads official templates)
        run: npm run smoke

      - name: CRUD compile test (official simple-backend)
        run: npm run test:crud-integration

      - name: Extended templates test (downloads official templates)
        run: npm run test:templates

      - name: Components assembly test (downloads egovframe-common-components)
        run: npm run test:components

      - name: Catalog pin and archive verification (official v5.0.6)
        run: npm run test:catalog-sync-live

      - name: AI assembly test (downloads egovframe-ai-rag)
        run: npm run test:ai-assembly
